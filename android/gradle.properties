android.builtInKotlin=false
android.enableJetifier=true
android.newDsl=false
android.useAndroidX=true
# Kotlin incremental compilation breaks when the pub cache (C:) and the project
# (D:) are on different drives: its RelocatableFileToPathConverter can't make a
# relative path across roots and throws "this and base files have different
# roots". Disabling it stops the cache errors (full compile was the fallback
# anyway). Remove this if the project and pub cache ever live on the same drive.
kotlin.incremental=false
kotlin.jvm.target.validation.mode = IGNORE
org.gradle.caching=true
org.gradle.daemon=true
org.gradle.jvmargs=-Xmx4096M
org.gradle.parallel=true
